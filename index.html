<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sketch Corpus Browser</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>Papers Browser</h1>
          <p id="subtitle">71 papers organized by two-level sketch taxonomy</p>
          <p id="subtitle">Sketching in Visualization: A Survey of Sketch-Based Interaction</p>
          <p id="subtitle">Zijian Yang, Zichun Dai, Yang Shi</p>
        </div>
        <div class="top-actions">
          <button class="ghost-button" id="resetFilters" type="button">Reset</button>
        </div>
      </header>

      <section class="browser">
        <aside class="sidebar" aria-label="Corpus filters">
          <section class="filter-panel">
            <h2>Search</h2>
            <form class="search-row" id="searchForm">
              <input id="searchInput" type="search" placeholder="Search title, author, venue">
              <button type="submit">Search</button>
            </form>
            <p class="count-line">Papers displayed: <strong id="displayCount">0</strong></p>
          </section>

          <section class="filter-panel">
            <h2>Year</h2>
            <div class="year-row">
              <input id="minYear" type="number" inputmode="numeric">
              <span>to</span>
              <input id="maxYear" type="number" inputmode="numeric">
            </div>
          </section>

          <section class="filter-panel taxonomy-panel">
            <h2>Categories</h2>
            <div id="taxonomyFilters" class="taxonomy"></div>
          </section>
        </aside>

        <section class="content">
          <div class="result-bar">
            <div>
              <strong id="activeLabel">All papers</strong>
              <span id="activeDetail"></span>
            </div>
            <label class="sort-label">
              Sort
              <select id="sortSelect">
                <option value="corpus">Corpus order</option>
                <option value="yearDesc">Year newest</option>
                <option value="yearAsc">Year oldest</option>
                <option value="title">Title</option>
              </select>
            </label>
          </div>
          <div id="paperGrid" class="paper-grid" aria-live="polite"></div>
        </section>
      </section>
    </main>

    <div class="modal-backdrop" id="modalBackdrop" hidden>
      <article class="paper-modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <button class="close-button" id="closeModal" type="button" aria-label="Close">×</button>
        <div class="modal-copy">
          <h2 id="modalTitle"></h2>
          <p class="byline" id="modalByline"></p>
          <div class="tag-row" id="modalTags"></div>
          <dl class="meta-list">
            <div>
              <dt>Sketch Role</dt>
              <dd id="modalSketchRole"></dd>
            </div>
            <div style="display: none;">
              <dt>Evaluation</dt>
              <dd id="modalEvaluation"></dd>
            </div>
          </dl>
          <h3>Abstract</h3>
          <p id="modalAbstract"></p>
          <details class="bibtex-block">
            <summary>BibTeX</summary>
            <pre id="modalBibtex"></pre>
          </details>
        </div>
        <div class="modal-media">
          <img id="modalImage" alt="">
        </div>
      </article>
    </div>

    <script src="data/papers.js"></script>
    <script src="app.js"></script>
  </body>
</html>
